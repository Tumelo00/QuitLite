name: Build DMG

# main'e her push'ta (ve elle tetiklemede) QuitLite'ı macOS sunucusunda derler,
# QuitLite.dmg'yi hem iş çıktısı (artifact) hem de "latest" sürümü olarak yayımlar.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Eşzamanlı push'larda yalnızca en son derleme yayımlansın; eskisi iptal edilir.
# Aksi halde iki run "latest" sürümü/etiketi üzerinde yarışır.
concurrency:
  group: build-dmg
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Depoyu çek
        uses: actions/checkout@v4

      - name: İmzalama sertifikasını içe aktar
        # Kendinden imzalı sertifikayı geçici bir anahtar zincirine yükler.
        # Sertifika sabit olduğu için imza her derlemede aynı kalır → Erişilebilirlik
        # (TCC) izni korunur. Secret HİÇ yoksa adım sessizce geçer (build.sh ad-hoc
        # imzalar). Ama secret VARSA ve içe aktarma başarısızsa adım hata verir —
        # böylece sessizce imzasız bir DMG "latest" olarak yayımlanmaz.
        env:
          CERT_P12: ${{ secrets.SIGNING_CERTIFICATE_P12 }}
          CERT_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$CERT_P12" ]; then
            echo "::warning::Sertifika secret'ı yok; ad-hoc imzalanacak."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/quitlite-signing.keychain-db"
          KPWD="$(openssl rand -base64 18)"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          if security create-keychain -p "$KPWD" "$KEYCHAIN" \
             && security set-keychain-settings -lut 21600 "$KEYCHAIN" \
             && security unlock-keychain -p "$KPWD" "$KEYCHAIN" \
             && security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign \
             && security set-key-partition-list -S apple-tool:,apple: -s -k "$KPWD" "$KEYCHAIN" \
             && security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"'); then
            echo "QUITLITE_SIGN_ID=QuitLite Self-Signed" >> "$GITHUB_ENV"
            echo "::notice::Kendinden imzalı sertifika içe aktarıldı."
          else
            rm -f "$RUNNER_TEMP/cert.p12"
            echo "::error::Sertifika içe aktarılamadı; derleme durduruluyor."
            exit 1
          fi
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: QuitLite'ı derle
        # build.sh'ı bash ile çağır: Windows'tan commit edilince çalıştırma biti
        # olmayabilir. QUITLITE_SIGN_ID ayarlıysa o kimlikle, değilse ad-hoc imzalar.
        run: bash build.sh

      - name: İmza ve mimariyi doğrula
        # İmza bütünlüğünü ve binary'nin universal (arm64 + x86_64) olduğunu
        # doğrular. Tek mimarili bir DMG'nin yayımlanmasını engeller.
        run: |
          codesign --verify --strict --verbose=2 QuitLite.app
          BIN=QuitLite.app/Contents/MacOS/QuitLite
          echo "--- mimari: $(lipo -archs "$BIN") ---"
          lipo -archs "$BIN" | grep -qw x86_64 || { echo "::error::x86_64 dilimi eksik"; exit 1; }
          lipo -archs "$BIN" | grep -qw arm64  || { echo "::error::arm64 dilimi eksik"; exit 1; }
          echo "--- imza özeti ---"
          codesign -dvv QuitLite.app 2>&1 || true

      - name: DMG'yi artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: QuitLite-dmg
          path: QuitLite.dmg
          if-no-files-found: error

      - name: latest sürümünü yayımla
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest QuitLite.dmg QuitLite.dmg.sha256 \
            --title "QuitLite — en son derleme" \
            --notes "main dalindan otomatik derlendi. QuitLite.dmg'yi indirin. Bütünlük doğrulaması için: QuitLite.dmg.sha256 dosyasını DMG ile aynı klasöre koyup \`shasum -a 256 -c QuitLite.dmg.sha256\` çalıştırın."
